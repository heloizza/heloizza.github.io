<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Scott Pilgrim :3</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!--  tinte  -->
    <input type="radio" name="hair-color" id="hair-pink" checked>
    <input type="radio" name="hair-color" id="hair-blue">
    <input type="radio" name="hair-color" id="hair-green">

    <!-- mi barra de navegacion principal -->
    <nav class="navbar navbar-expand mb-4 py-3 navbar-custom">
        <div class="container justify-content-center">
            <ul class="navbar-nav gap-4">
                <li class="nav-item">
                    <a class="nav-link nav-alt" href="index.html">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-alt" href="galeria.html">Galería</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-alt active-alt" href="contacto.html">Contacto</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- texto que se mueve (marquee) -->
    <div class="container-fluid px-4">
        <div class="marquee-box">
            <marquee scrollamount="10">★ Contacto ★ Mándanos un mensaje ★ (>_<)9 ★</marquee>
        </div>
    </div>

    <!-- contenedor de todo lo demas -->
    <div class="container-fluid px-4">
        
        <!-- header con el logo animado -->
        <header class="alt-box">
            <a href="index.html" class="logo-container">
                <img src="img/logo_2.jpg" alt="Sex Bob-Omb Logo" class="logo-animated">
                <span class="logo-text">Contacto!</span>
            </a>

            <!-- botones de los colores -->
            <div class="ramona-controls">
                <span>Tinte:</span>
                <label for="hair-pink" class="color-btn btn-pink" title="Rosa"></label>
                <label for="hair-blue" class="color-btn btn-blue" title="Azul"></label>
                <label for="hair-green" class="color-btn btn-green" title="Verde"></label>
            </div>
        </header>

        <!-- seccion del formulario de contacto -->
        <main class="container my-5" style="max-width: 600px;">
            <div class="alt-box p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <h1 class="contact-main-title mb-2">¡Contáctanos!</h1>
                    <p class="contact-subtitle">¿Dudas, comentarios o sugerencias? Escríbenos ~ (>_<)9</p>
                </div>

                <!-- form para cumplir con la actividad -->
                <form>
                    <div class="mb-3">
                        <label for="nombre" class="form-label font-retro">NOMBRE:</label>
                        <input type="text" class="form-control retro-input" id="nombre" placeholder="Tu nombre..." required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label font-retro">CORREO ELECTRÓNICO:</label>
                        <input type="email" class="form-control retro-input" id="email" placeholder="tucorreo@gmail.com" required>
                    </div>

                    <div class="mb-4">
                        <label for="mensaje" class="form-label font-retro">MENSAJE:</label>
                        <textarea class="form-control retro-input" id="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="retro-submit-btn">ENVIAR MENSAJE</button>
                    </div>
                </form>

            </div>
        </main>
    </div>

    <!-- pie de pagina -->
    <footer class="footer-custom text-white mt-5">
        <div class="container py-4">
            <ul class="nav justify-content-center pb-3 mb-3 border-bottom border-light">
                <li class="nav-item"><a href="index.html" class="nav-link px-2 text-white">Inicio</a></li>
                <li class="nav-item"><a href="galeria.html" class="nav-link px-2 text-white">Galería</a></li>
                <li class="nav-item"><a href="contacto.html" class="nav-link px-2 text-white">Contacto</a></li>
            </ul>
            <p class="text-center text-white mb-0 font-weight-bold" style="font-size: 1.1rem; text-shadow: 1px 1px 2px #000;">&copy; 2026 Página creada por Nicole</p>
        </div>
    </footer>

</body>
</html>
